"$schema" = "https://starship.rs/config-schema.json"

# THEME
format = """
[Ôò¡ÔöÇ](lq)\
[¯éÂ](def_purple)\
$os\
[¯é░](fg:def_purple bg:lc_blue)\
$directory\
[¯é░](fg:lc_blue bg:def_mint)\
$git_branch\
[¯é░](fg:def_mint bg:lc_green)\
$shell\
[¯é░](fg:lc_green bg:def_yellow)\
$cmd_duration\
[¯é░](def_yellow)\
$fill\
[¯é▓](lc_neutral)\
$status\
[¯é▓](fg:def_orange bg:lc_neutral)\
$memory_usage\
[¯é▓](fg:lc_red bg:def_orange)\
${custom.directory}\
[¯é▓](fg:def_pink bg:lc_red)\
$time\
[¯é┤](def_pink)\
[ÔöÇÔò«](lq)\
$line_break\
[Ôò░ÔöÇ](lq)\
