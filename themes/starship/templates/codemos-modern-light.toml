# COLORS
palette = "CodemosModernLight"
[palettes.CodemosModernLight]
lc = "@light/flat/{hex7:fill.terminal.loc}"
lq = "@light/flat/{hex7:fill.terminal.loq}"
hq = "@light/flat/{hex7:fill.terminal.hiq}"
hc = "@light/flat/{hex7:fill.terminal.hic}"

def_brown = "@light/flat/{hex7:basic.def.brown.pri}"
def_red = "@light/flat/{hex7:basic.def.red.pri}"
def_orange = "@light/flat/{hex7:basic.def.orange.pri}"
def_yellow = "@light/flat/{hex7:basic.def.yellow.pri}"
def_green = "@light/flat/{hex7:basic.def.green.pri}"
def_mint = "@light/flat/{hex7:basic.def.mint.pri}"
def_blue = "@light/flat/{hex7:basic.def.blue.pri}"
def_purple = "@light/flat/{hex7:basic.def.purple.pri}"
def_pink = "@light/flat/{hex7:basic.def.pink.pri}"

alt_red = "@light/flat/{hex7:basic.alt.red.pri}"
alt_orange = "@light/flat/{hex7:basic.alt.orange.pri}"
alt_yellow = "@light/flat/{hex7:basic.alt.yellow.pri}"
alt_green = "@light/flat/{hex7:basic.alt.green.pri}"
alt_mint = "@light/flat/{hex7:basic.alt.mint.pri}"
alt_blue = "@light/flat/{hex7:basic.alt.blue.pri}"
alt_purple = "@light/flat/{hex7:basic.alt.purple.pri}"
alt_pink = "@light/flat/{hex7:basic.alt.pink.pri}"

lc_neutral = "@light/flat/{hex7:basic.neutral.qui&bg.solid.base}"
lc_red = "@light/flat/{hex7:basic.def.red.qui&bg.solid.base}"
lc_orange = "@light/flat/{hex7:basic.def.orange.qui&bg.solid.base}"
lc_yellow = "@light/flat/{hex7:basic.def.yellow.qui&bg.solid.base}"
lc_green = "@light/flat/{hex7:basic.def.green.qui&bg.solid.base}"
lc_mint = "@light/flat/{hex7:basic.def.mint.qui&bg.solid.base}"
lc_blue = "@light/flat/{hex7:basic.def.blue.qui&bg.solid.base}"
lc_purple = "@light/flat/{hex7:basic.def.purple.qui&bg.solid.base}"
lc_pink = "@light/flat/{hex7:basic.def.pink.qui&bg.solid.base}"

# LEFT ALIGNED PROMPT

[os]
style = "fg:lc_purple bg:def_purple"
format = "[$symbol]($style)"
disabled = false

[os.symbols]
Macos = "¯£æ "
Windows = "¯ÿ¬ "

[directory]
style = "fg:alt_blue bg:lc_blue"
repo_root_style = "fg:def_blue bg:lc_blue"
read_only = "´öæ"
read_only_style = "fg:def_red bg:lc_blue"
format = """
[ $path ]($style)\
([¯¼É]($style)[ $read_only ]($read_only_style))"""
repo_root_format = """
[ ´Æç ]($repo_root_style)\
([$path ]($style))\
([¯¼É]($style)[ $read_only ]($read_only_style))"""
truncation_length = 3
truncation_symbol = "ÔÇª/"

[git_branch]
symbol = "¾░ÿ¼"
style = "fg:lc_mint bg:def_mint"
format = "[ $symbol $branch ]($style)"

[shell]
style = "fg:def_green bg:lc_green"
bash_indicator = "[¯»è]($style)"
fish_indicator = "[¾░ê║]($style)"
zsh_indicator = "[¯Üæ]($style)"
powershell_indicator = "[¾░¿è]($style)"
cmd_indicator = "[¯»ä]($style)"
unknown_indicator = "[´ä¿]($style)"
format = "[ $indicator ]($style)"
disabled = false

[cmd_duration]
min_time = 25
style = "fg:lc_yellow bg:def_yellow"
format = "[ ¯¡╝ $duration ]($style)"

# CENTER ALIGNED PROMPT

[fill]
symbol = "ÔÇó"
style = "fg:lc"

# RIGHT ALIGNED PROMPT

[status]
symbol = "[´Çì ](fg:def_red bg:lc_neutral)"
success_symbol = "[´Çî ](fg:def_green bg:lc_neutral)"
format = "$symbol"
disabled = false

[memory_usage]
threshold = 75
style = "fg:lc_orange bg:def_orange"
symbol = " ¯ëª "
format = "[$symbol$ram_pct ]($style)"
disabled = false

[custom.directory]
command = "basename `git rev-parse --show-toplevel`"
shell = ["bash"]
require_repo = true
when = "true"
symbol = "´Æç"
style = "fg:def_red bg:lc_red"
format = "[ $symbol]($style)[ $output ](fg:alt_red bg:lc_red)"

[time]
disabled = false
time_format = "%R"
style = "fg:lc_pink bg:def_pink"
format = "[ ¯Äà $time]($style)"

# CHARACTER
[character]
success_symbol = "[ÔØ»](bold def_green)"
error_symbol = "[ÔØ»](bold def_red)"
